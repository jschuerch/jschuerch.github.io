    rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    :root {
      --color-gray: #505050;
      --color-green: #145f15;
      --color-yellow: #936e00;
      --color-red: #520e0e;
    }

    .wordhunt-container {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
    }

    .wordhunt-error,
    .wordhunt-info {
      position: fixed;
      display: block;
      background: var(--border);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      top: calc(var(--nav-h) + 1rem);
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .wordhunt-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
      transform: translateX(-4.5rem);
    }

    .wordhunt-row {
      display: contents;
    }

    .wordhunt-num-correct,
    .wordhunt-num-present {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wordhunt-num-correct {
      color: var(--color-green);
    }

    .wordhunt-num-present {
      color: var(--color-yellow);
    }

    .wordhunt-cell {
      width: 3rem;
      height: 3rem;
      border: 2px solid var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .wordhunt-cell.empty {
      background-color: transparent;
    }

    .wordhunt-cell.filled {
      border-color: var(--text);
    }

    .correct .wordhunt-cell.filled {
      background-color: var(--color-green);
      color: #fff;
    }

    .incorrect .wordhunt-cell.filled {
      background-color: var(--color-gray);
      color: #fff;
    }

    .filled .wordhunt-cell.filled {
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .filled .wordhunt-cell.highlight1 {
      background-color: var(--color-red);
    }

    .filled .wordhunt-cell.highlight2 {
      background-color: var(--color-yellow);
    }

    .filled .wordhunt-cell.highlight3 {
      background-color: var(--color-green);
    }

    .wordhunt-btn-container {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
    }

    .wordhunt-container ::selection {
      background: transparent;
    }

    .wordhunt-success {
      margin: 2rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
