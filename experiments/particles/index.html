<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Particles - Experiment 01</title>
  <meta name="description"
    content="Particles that move around independently and interact with each other and the mouse" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main>
    <canvas id="particle-canvas"></canvas>
    <div class="configuration open">
      <div class="config-toggle" aria-label="toggle configurations" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="currentColor" stroke="currentColor" stroke-width="1"
          stroke-linecap="round">
          <circle cx="3" cy="11" r="2" />
          <circle cx="11" cy="11" r="2" />
          <circle cx="19" cy="11" r="2" />
        </svg>
      </div>

      <div class="config-group toggle-group-container">
        <span class="config-label">Canvas Mode</span>

        <div class="toggle-group" id="theme-toggle">
          <div class="toggle-slider"></div>
          <button data-mode="bounce">Bounce</button>
          <button data-mode="wrap">Wrap</button>
        </div>

      </div>

    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>

</html>
