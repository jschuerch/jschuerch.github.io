<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Particles - Experiment 01</title>
  <meta name="description"
    content="Particles that move around independently and interact with each other and the mouse" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/base.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      padding: 0;
      background: #fff;
    }

    main {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
    }

    canvas {
      display: block;
      background: pink;
      width: 100vw;
      height: 100vh;
    }

    .configuration {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(1px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 1rem 0;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      min-width: calc(22px + 2rem);
      min-height: calc(22px + 2rem);
      transition: padding var(--transition), opacity var(--transition);
    }

    .configuration .config-group {
      transition: padding var(--transition), opacity var(--transition);
      display: none;
      opacity: 0;
    }

    .configuration.open {
      padding-bottom: 1rem;
    }

    .configuration.open .config-group {
      display: flex;
      opacity: 1;
    }

    .config-toggle {
      position: absolute;
      display: flex;
      top: 1rem;
      left: 1rem;
      cursor: pointer;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .config-label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .toggle-group {
      display: inline-flex;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      position: relative;
    }

    .toggle-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      width: 75px;
      background: var(--accent);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: left var(--transition), width var(--transition);
      pointer-events: none;
    }

    .toggle-group button {
      position: relative;
      background: none;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      color: var(--muted);
      transition: color var(--transition);
    }

    .toggle-group button.active {
      color: var(--bg);
    }
  </style>
</head>

<body>

  <main>
    <canvas id="particle-canvas"></canvas>
    <div class="configuration open">
      <div class="config-toggle" aria-label="toggle configurations" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="currentColor" stroke="currentColor" stroke-width="1"
          stroke-linecap="round">
          <circle cx="3" cy="11" r="2" />
          <circle cx="11" cy="11" r="2" />
          <circle cx="19" cy="11" r="2" />
        </svg>
      </div>
      <div class="config-group">
        <span class="config-label">Particle Mode</span>

        <div class="toggle-group" id="theme-toggle">
          <div class="toggle-slider"></div>
          <button onclick="selectTab('theme-toggle', 0, 'bounce')">Bounce</button>
          <button onclick="selectTab('theme-toggle', 1, 'wrap')">Wrap</button>
        </div>

      </div>

    </div>
  </main>
  <script>
    /* CONFIGURATION */
    const ParticleMode = {
      BOUNCE: "bounce",
      WRAP: "wrap"
    };
    let mode = ParticleMode.BOUNCE;

    function selectTab(groupId, index, newMode) {
      const group = document.getElementById(groupId);
      const buttons = group.querySelectorAll('button');
      const slider = group.querySelector('.toggle-slider');

      buttons.forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });

      const activeBtn = buttons[index];
      slider.style.left = activeBtn.offsetLeft + 'px';
      slider.style.width = activeBtn.offsetWidth + 'px';

      mode = newMode;
    }

    /* Configuration toggle */
    const config = document.querySelector('.configuration');
    const configToggle = config.querySelector('.config-toggle');
    if (config && configToggle) {
      configToggle.addEventListener('click', () => {
        config.classList.toggle('open');
        configToggle.setAttribute(
          'aria-expanded',
          config.classList.contains('open')
        );
      });
    }

    // Initialise on page load
    document.querySelectorAll('.toggle-group').forEach(group => {
      const isOpen = config.classList.contains('open');
      if (!isOpen) config.classList.add('open');
      let idx = 0;
      if (mode == ParticleMode.WRAP) idx = 1;
      const activeBtn = group.querySelectorAll('button')[idx];
      const slider = group.querySelector('.toggle-slider');
      activeBtn.classList.add('active');
      slider.style.left = activeBtn.offsetLeft + 'px';
      slider.style.width = activeBtn.offsetWidth + 'px';
      if (!isOpen) config.classList.remove('open');
    });



    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');

    let W, H, particles;
    let mouse = { x: -9999, y: -9999 };

    const count = 120;
    const radius = 2.5;
    const maxEdgeDist = 120;
    const speed = 1;
    const repel = 90;
    const force = 8;
    const color = 'black';

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * speed;
        this.vy = (Math.random() - 0.5) * speed;
        this.rvx = 0;
        this.rvy = 0;
        this.color = "black";
        this.radius = (Math.random() * 0.8 + 0.2) * radius;
        this.alpha = (Math.random() * 0.8 + 0.2);
      }

      update() {
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < repel && dist > 0) {
          const f = 1 - dist / repel;
          let dirX = dx / dist;
          let dirY = dy / dist;
          this.rvx = dirX * f * force;
          this.rvy = dirY * f * force;
        }
        this.x += this.vx + this.rvx;
        this.y += this.vy + this.rvy;
        this.rvx *= 0.98;
        this.rvy *= 0.98;

        // Keep particles inside the canvas
        if (mode == ParticleMode.BOUNCE) {
          if (this.x < 0 || this.x > W) {
            this.vx *= -1;
            if (this.x < 0) this.x = 0;
            if (this.x > W) this.x = W;
          }
          if (this.y < 0 || this.y > H) {
            this.vy *= -1;
            if (this.y < 0) this.y = 0;
            if (this.y > H) this.y = H;
          }
        } else if (mode == ParticleMode.WRAP) {
          this.wrapParticles();
        }
      }

      wrapParticles() {
        if (this.x < 0) {
          this.x = W;
        } else if (this.x > W) {
          this.x = 0;
        }
        if (this.y < 0) {
          this.y = H;
        } else if (this.y > H) {
          this.y = 0;
        }
      }

      draw() {
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function drawMouse() {
      // Set the blur intensity
      ctx.filter = 'blur(30px)';

      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, repel / 2, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();

      // Reset filter for future drawings
      ctx.filter = 'none';
    }

    function drawEdges() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = 0; j < particles.length; j++) {
          dx = Math.abs(particles[i].x - particles[j].x)
          dy = Math.abs(particles[i].y - particles[j].y)
          dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < maxEdgeDist) {
            ctx.globalAlpha = (1 - dist / maxEdgeDist) * 0.15;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      particles.forEach((p) => p.reset());
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawMouse();
      particles.forEach((p) => { p.update(); p.draw(); });
      drawEdges();
      requestAnimationFrame(loop);
    }

    function init() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      particles = Array.from({ length: count }, () => new Particle());
    }


    init();
    loop();

    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY });
    window.addEventListener('touchmove', (e) => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }, { passive: true });
    canvas.addEventListener('mouseleave', (e) => { mouse.x = -9999; mouse.y = -9999 })

  </script>

</body>

</html>
