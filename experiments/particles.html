<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Particles - Experiment 01</title>
  <meta name="description"
    content="Particles that move around independently and interact with each other and the mouse" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/base.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      padding: 0;
      background: #fff;
    }

    main {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
    }

    canvas {
      display: block;
      background: pink;
      width: 100vw;
      height: 100vh;
    }

    .configuration {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(1px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .config-label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .toggle-group {
      display: inline-flex;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      position: relative;
    }

    .toggle-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      background: var(--accent);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: left var(--transition), width var(--transition);
      pointer-events: none;
    }

    .toggle-group button {
      position: relative;
      background: none;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      color: var(--muted);
      transition: color var(--transition);
    }

    .toggle-group button.active {
      color: var(--bg);
    }
  </style>
</head>

<body>

  <main>
    <canvas id="particle-canvas"></canvas>
    <div class="configuration">

      <div class="config-group">
        <span class="config-label">Particle Mode</span>

        <div class="toggle-group" id="theme-toggle">
          <div class="toggle-slider"></div>
          <button onclick="selectTab('theme-toggle', 0, 'wrap')">Wrap</button>
          <button onclick="selectTab('theme-toggle', 1, 'bounce')">Bounce</button>
        </div>

      </div>

    </div>
  </main>
  <script>
    /* CONFIGURATION */
    const ParticleMode = {
      WRAP: "wrap",
      BOUNCE: "bounce"
    };
    let mode = ParticleMode.BOUNCE;

    function selectTab(groupId, index, newMode) {
      const group = document.getElementById(groupId);
      const buttons = group.querySelectorAll('button');
      const slider = group.querySelector('.toggle-slider');

      buttons.forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });

      const activeBtn = buttons[index];
      slider.style.left = activeBtn.offsetLeft + 'px';
      slider.style.width = activeBtn.offsetWidth + 'px';

      mode = newMode;
    }

    // Initialise on page load
    document.querySelectorAll('.toggle-group').forEach(group => {
      let idx = 1;
      if (mode == ParticleMode.BOUNCE) idx = 1;
      const activeBtn = group.querySelectorAll('button')[idx];
      const slider = group.querySelector('.toggle-slider');
      activeBtn.classList.add('active');
      slider.style.left = activeBtn.offsetLeft + 'px';
      slider.style.width = activeBtn.offsetWidth + 'px';
    });


    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');

    let W, H, particles;
    let mouse = { x: -9999, y: -9999 };

    const count = 120;
    const radius = 2;
    const speed = 0.4;
    const repel = 90;
    const force = 2.5;
    const color = 'black';

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * speed;
        this.vy = (Math.random() - 0.5) * speed;
        this.color = "black";
      }

      update() {
        // console.log(mouse.x, mouse.y);
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx, dy * dy);
        if (dist < repel && dist > 0) {
          const f = 1 - dist / repel;
          let dirX = dx / dist;
          let dirY = dy / dist;
          this.vx += dirX * f * force;
          this.vy += dirY * f * force;
        }
        this.x += this.vx;
        this.y += this.vy;

        // Keep particles inside the canvas
        if (mode == ParticleMode.BOUNCE) {
          if (this.x <= 0 || this.x >= W) {
            this.vx *= -1;
          }
          if (this.y <= 0 || this.y >= H) {
            this.vy *= -1;
          }
        } else if (mode == ParticleMode.WRAP) {
          this.moveInFrame();
        }
      }

      moveInFrame() {
        if (this.x < 0) {
          this.x = W;
        } else if (this.x > W) {
          this.x = 0;
        }
        if (this.y < 0) {
          this.y = H;
        } else if (this.y > H) {
          this.y = 0;
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    function drawMouse() {
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      particles.forEach((p) => p.reset());
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach((p) => { p.update(); p.draw(); });
      drawMouse();
      requestAnimationFrame(loop);
    }

    function init() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      particles = Array.from({ length: count }, () => new Particle());
      particles[0].color = "white";
    }


    init();
    loop();

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY });
    window.addEventListener("mouseleave", (e) => { console.log("mouse has left"); mouse.x = -9999; mouse.y = -9999 });

  </script>

</body>

</html>
